name: spidey-ticket-watch

on:
  workflow_dispatch: {}   # manual trigger button, also hit remotely by cron-job.org

permissions:
  contents: write

concurrency:
  group: spidey-ticket-watch
  cancel-in-progress: false

jobs:
  check-booking:
    runs-on: ubuntu-latest
    steps:
      - name: Grab the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Check BookMyShow + alert if open
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python poller.py

      - name: Save updated memory.json state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "spidey-ticket-watch-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "bot: refresh watch state [skip ci]"
            git push
          else
            echo "state unchanged, nothing to commit"
          fi
